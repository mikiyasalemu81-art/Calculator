<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>Calculator</title>
	<style>
		:root{--bg:#282c34;--panel:#3a3f47;--accent:#61dafb;--btn:#4b5158;--text:#fff}
		*{box-sizing:border-box}
		html,body{height:100%}
		body{margin:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f1720,#00121a);font-family:Arial,Helvetica,sans-serif}
		.calc{width:340px;background:var(--panel);border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,.6);padding:16px}
		.display{height:72px;background:var(--bg);color:var(--text);border-radius:8px;padding:12px;display:flex;flex-direction:column;justify-content:center;align-items:flex-end;font-size:24px;word-break:break-all}
		.history{font-size:14px;color:#9aa2ab;opacity:.9}
		.output{font-size:28px;margin-top:4px}
		.keys{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:14px}
		button{height:56px;border-radius:8px;border:0;background:var(--btn);color:var(--text);font-size:18px;cursor:pointer}
		button.op{background:#2b6b8f;color:#fff}
		button.equal{grid-column:span 2;background:var(--accent);color:#062029;font-weight:700}
		button.span2{grid-column:span 2}
		button:active{transform:translateY(1px)}
	</style>
</head>
<body>
	<div class="calc" role="application">
		<div class="display" id="display">
			<div class="history" id="history"></div>
			<div class="output" id="output">0</div>
		</div>
		<div class="keys">
			<button id="clear">C</button>
			<button id="back">⌫</button>
			<button id="percent">%</button>
			<button class="op" data-op="/">÷</button>

			<button data-num="7">7</button>
			<button data-num="8">8</button>
			<button data-num="9">9</button>
			<button class="op" data-op="*">×</button>

			<button data-num="4">4</button>
			<button data-num="5">5</button>
			<button data-num="6">6</button>
			<button class="op" data-op="-">−</button>

			<button data-num="1">1</button>
			<button data-num="2">2</button>
			<button data-num="3">3</button>
			<button class="op" data-op="+">+</button>

			<button data-num="0" class="span2">0</button>
			<button data-dot=".">.</button>
			<button class="equal" id="equals">=</button>
		</div>
	</div>

	<script>
		const historyEl = document.getElementById('history');
		const outputEl = document.getElementById('output');
		let expr = '';

		function update(){
			historyEl.textContent = expr;
			outputEl.textContent = expr || '0';
		}

		function safeEval(s){
			// Allow only numbers, operators and parentheses, percent handled separately
			if(!/^[0-9+\-*/().%\s]*$/.test(s)) throw new Error('Invalid');
			// Replace percentage: convert '50%' -> '(50/100)'
			s = s.replace(/(\d+(?:\.\d+)?)%/g, '($1/100)');
			return Function('return '+s)();
		}

		document.querySelectorAll('[data-num]').forEach(b=>b.addEventListener('click',()=>{ expr += b.dataset.num; update(); }));
		document.querySelectorAll('[data-op]').forEach(b=>b.addEventListener('click',()=>{ expr += b.dataset.op; update(); }));
		document.querySelector('[data-dot]').addEventListener('click',()=>{ expr += '.'; update(); });
		document.getElementById('clear').addEventListener('click',()=>{ expr=''; update(); });
		document.getElementById('back').addEventListener('click',()=>{ expr = expr.slice(0,-1); update(); });
		document.getElementById('percent').addEventListener('click',()=>{ expr += '%'; update(); });
		document.getElementById('equals').addEventListener('click',()=>{ try{ const res = safeEval(expr||'0'); expr = String(res); update(); }catch(e){ outputEl.textContent='Error'; setTimeout(()=>{ expr=''; update(); },900); } });

		// Keyboard support
		window.addEventListener('keydown', e=>{
			if(e.key >= '0' && e.key <= '9') { expr += e.key; update(); }
			else if(['+','-','/','*','(',')'].includes(e.key)){ expr += e.key; update(); }
			else if(e.key === 'Enter' || e.key === '='){ e.preventDefault(); document.getElementById('equals').click(); }
			else if(e.key === 'Backspace'){ expr = expr.slice(0,-1); update(); }
			else if(e.key === 'Escape'){ expr=''; update(); }
			else if(e.key === '.') { expr += '.'; update(); }
			else if(e.key === '%') { expr += '%'; update(); }
		});

		update();
	</script>
</body>
</html>
